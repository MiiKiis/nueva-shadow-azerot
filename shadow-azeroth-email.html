<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIN de seguridad</title>
  </head>
  <body style="margin:0;padding:0;background:#090812;color:#f8fafc;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#090812;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#120b1f;border:1px solid rgba(168,85,247,.35);border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:24px;background:linear-gradient(90deg,#28103d,#101828);">
                <h1 style="margin:0;font-size:28px;font-weight:800;color:#fff;">Shadow Azeroth</h1>
                <p style="margin:8px 0 0;color:#cbd5e1;">Confirmacion de seguridad de cuenta</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;line-height:1.6;">
                <p style="margin:0 0 12px;">Hola <strong>{{ACCOUNT_NAME}}</strong>,</p>
                <p style="margin:0 0 12px;">Tu PIN de seguridad configurado para proteger la cuenta es:</p>
                <p style="margin:0 0 16px;font-size:30px;letter-spacing:6px;font-weight:800;color:#67e8f9;">{{PIN_CODE}}</p>
                <p style="margin:0 0 12px;color:#cbd5e1;">No compartas este PIN con nadie.</p>
                <p style="margin:16px 0 0;color:#67e8f9;font-weight:700;">Lok'tar ogar.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
